<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ファシリテーター★大抽選会!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Maru Gothic Pro", "ヒラギノ丸ゴ Pro W4", "メイリオ", Meiryo, sans-serif;
    background:
      repeating-linear-gradient(45deg, #ffd700 0 30px, #ff4500 30px 60px, #ff1493 60px 90px, #00bfff 90px 120px);
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    background: #fffbe6;
    border: 8px solid #8b0000;
    border-radius: 20px;
    box-shadow: 0 0 0 4px #ffd700, 0 10px 40px rgba(0,0,0,0.5);
    padding: 30px;
    position: relative;
  }
  .title {
    text-align: center;
    font-size: 48px;
    font-weight: 900;
    background: linear-gradient(180deg, #ff0000 0%, #ff8c00 50%, #ffd700 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 3px 3px 0 #000;
    -webkit-text-stroke: 2px #000;
    margin-bottom: 10px;
    letter-spacing: 4px;
    animation: wiggle 1.2s ease-in-out infinite;
  }
  .subtitle {
    text-align: center;
    font-size: 18px;
    color: #8b0000;
    margin-bottom: 20px;
    font-weight: bold;
  }
  .subtitle::before { content: "★ "; color: #ff0; -webkit-text-stroke: 1px #000; }
  .subtitle::after { content: " ★"; color: #ff0; -webkit-text-stroke: 1px #000; }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-2deg) scale(1); }
    50% { transform: rotate(2deg) scale(1.03); }
  }
  .members {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 25px;
  }
  .member {
    padding: 14px 8px;
    border: 4px solid #000;
    border-radius: 12px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(180deg, #fff 0%, #ffecb3 100%);
    color: #8b0000;
    transition: all 0.15s;
    user-select: none;
    box-shadow: 3px 3px 0 #000;
  }
  .member:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 #000; }
  .member:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }
  .member.excluded {
    background: #888;
    color: #ddd;
    text-decoration: line-through;
    opacity: 0.6;
    transform: rotate(-3deg);
  }
  .instruction {
    text-align: center;
    color: #333;
    margin-bottom: 15px;
    font-size: 14px;
    background: #fff0b3;
    padding: 8px;
    border-radius: 8px;
    border: 2px dashed #8b0000;
  }
  .roulette-stage {
    background: radial-gradient(ellipse at center, #ffffff 0%, #fff5e6 100%);
    border: 6px solid #ffd700;
    border-radius: 15px;
    padding: 30px 20px;
    margin-bottom: 25px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .roulette-stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      repeating-conic-gradient(from 0deg at 50% 50%,
        rgba(255,140,0,0.12) 0deg 10deg,
        transparent 10deg 20deg);
    animation: bg-spin 10s linear infinite;
    pointer-events: none;
  }
  @keyframes bg-spin { to { transform: rotate(360deg); } }

  .wheel-wrap {
    position: relative;
    width: 420px;
    height: 420px;
    max-width: 90vw;
    max-height: 90vw;
  }
  .wheel {
    width: 100%;
    height: 100%;
    transform: rotate(0deg);
    filter: drop-shadow(0 0 15px rgba(255,215,0,0.7));
  }
  .wheel-frame {
    position: absolute;
    inset: -12px;
    border: 10px solid #ffd700;
    border-radius: 50%;
    box-shadow: 0 0 0 4px #8b0000, inset 0 0 0 4px #8b0000;
    pointer-events: none;
  }
  .bulbs {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    pointer-events: none;
  }
  .bulb {
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, #ff0 40%, #f80 100%);
    box-shadow: 0 0 10px #ff0, 0 0 20px #f80;
    top: 50%; left: 50%;
    margin: -7px;
  }
  .pointer {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 25px solid transparent;
    border-right: 25px solid transparent;
    border-top: 50px solid #ff0000;
    filter: drop-shadow(2px 2px 0 #000) drop-shadow(-2px 0 0 #000);
    z-index: 10;
  }
  .pointer::after {
    content: "";
    position: absolute;
    top: -55px;
    left: -25px;
    width: 50px;
    height: 20px;
    background: #ffd700;
    border: 3px solid #000;
    border-radius: 5px;
  }
  .hub {
    position: absolute;
    top: 50%; left: 50%;
    width: 70px; height: 70px;
    margin: -35px;
    background: radial-gradient(circle, #ffd700 0%, #ff8c00 70%, #8b0000 100%);
    border: 5px solid #000;
    border-radius: 50%;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    color: #8b0000;
    font-size: 14px;
    text-shadow: 1px 1px 0 #ffd700;
    box-shadow: 0 0 15px rgba(255,215,0,0.8);
  }

  .buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
  }
  .btn {
    padding: 18px 45px;
    font-size: 26px;
    font-weight: 900;
    border: 5px solid #000;
    border-radius: 50px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 4px;
    box-shadow: 5px 5px 0 #000;
    transition: all 0.1s;
  }
  .btn:hover:not(:disabled) { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 #000; }
  .btn:active:not(:disabled) { transform: translate(3px,3px); box-shadow: 2px 2px 0 #000; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-start {
    background: linear-gradient(180deg, #ff4500 0%, #ff0000 100%);
    color: #fff; text-shadow: 2px 2px 0 #000;
  }
  .btn-reset {
    background: linear-gradient(180deg, #00bfff 0%, #1e90ff 100%);
    color: #fff; text-shadow: 2px 2px 0 #000;
  }

  .winner-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 90px;
    font-weight: 900;
    color: #ff0;
    -webkit-text-stroke: 5px #8b0000;
    z-index: 100;
    pointer-events: none;
    text-shadow: 6px 6px 0 #000;
    letter-spacing: 10px;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  .winner-banner.show {
    transform: translate(-50%, -50%) scale(1) rotate(-5deg);
  }
  .confetti {
    position: fixed;
    width: 12px;
    height: 12px;
    pointer-events: none;
    z-index: 99;
    top: -20px;
  }
  .wheel.celebrate { animation: celebrate 0.6s ease-in-out 3; }
  @keyframes celebrate {
    0%, 100% { filter: drop-shadow(0 0 15px rgba(255,215,0,0.7)); }
    50% { filter: drop-shadow(0 0 30px #ff0) drop-shadow(0 0 50px #f0f); }
  }
  .bulb.on {
    background: radial-gradient(circle, #fff 0%, #ff0 40%, #f80 100%);
    box-shadow: 0 0 12px #fff, 0 0 25px #ff0;
  }
  .bulb.off {
    background: radial-gradient(circle, #ffcc80 0%, #aa6600 70%);
    box-shadow: 0 0 3px #aa6600;
  }

  @media (max-width: 600px) {
    .title { font-size: 32px; }
    .members { grid-template-columns: repeat(2, 1fr); }
    .btn { padding: 14px 28px; font-size: 20px; }
    .winner-banner { font-size: 50px; }
    .hub { width: 50px; height: 50px; margin: -25px; font-size: 10px; }
  }
</style>
</head>
<body>
<div class="container" id="container">
  <h1 class="title">大抽選会!!</h1>
  <p class="subtitle">本日のファシリテーターは一体ダレだ!?</p>

  <p class="instruction">▼ 欠席メンバーをクリックで除外! もう一度クリックで復活! ▼</p>
  <div class="members" id="members"></div>

  <div class="roulette-stage">
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <svg class="wheel" id="wheel" viewBox="-200 -200 400 400"></svg>
      <div class="wheel-frame"></div>
      <div class="bulbs" id="bulbs"></div>
      <div class="hub">運命の<br>大車輪</div>
    </div>
  </div>

  <div class="buttons">
    <button class="btn btn-start" id="startBtn">スタート!</button>
    <button class="btn btn-reset" id="resetBtn">リセット</button>
  </div>
</div>

<div class="winner-banner" id="banner">決定ッ!!</div>

<script>
const NAMES = ["森永","宮原","伊藤","山下","成澤","鎌田","田中","武井"];
const COLORS = ["#ff3b3b","#ffd700","#00bfff","#32cd32","#ff69b4","#ff8c00","#9370db","#00ced1"];
const excluded = new Set();
let lastWinner = null;
let isSpinning = false;
let currentRotation = 0;

const membersEl = document.getElementById('members');
const wheelEl = document.getElementById('wheel');
const bulbsEl = document.getElementById('bulbs');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const banner = document.getElementById('banner');

// Bulbs around wheel
const BULB_COUNT = 24;
function buildBulbs() {
  bulbsEl.innerHTML = '';
  for (let i = 0; i < BULB_COUNT; i++) {
    const b = document.createElement('div');
    b.className = 'bulb ' + (i % 2 === 0 ? 'on' : 'off');
    const angle = (i / BULB_COUNT) * 360;
    const rad = angle * Math.PI / 180;
    const R = 210;
    b.style.left = `calc(50% + ${Math.sin(rad) * R}px)`;
    b.style.top = `calc(50% - ${Math.cos(rad) * R}px)`;
    b.style.transform = 'translate(-50%, -50%)';
    b.dataset.index = i;
    bulbsEl.appendChild(b);
  }
}
buildBulbs();

let bulbPhase = 0;
setInterval(() => {
  bulbPhase = (bulbPhase + 1) % 2;
  bulbsEl.querySelectorAll('.bulb').forEach((b, i) => {
    const on = (i % 2) === bulbPhase;
    b.classList.toggle('on', on);
    b.classList.toggle('off', !on);
  });
}, 400);

function renderMembers() {
  membersEl.innerHTML = '';
  NAMES.forEach((name) => {
    const div = document.createElement('div');
    div.className = 'member' + (excluded.has(name) ? ' excluded' : '');
    div.textContent = name;
    div.onclick = () => {
      if (isSpinning) return;
      if (excluded.has(name)) excluded.delete(name);
      else excluded.add(name);
      renderMembers();
      drawWheel();
    };
    membersEl.appendChild(div);
  });
}

function getCandidates() {
  return NAMES.filter(n => !excluded.has(n));
}

function drawWheel() {
  const candidates = getCandidates();
  wheelEl.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  if (candidates.length === 0) {
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('r', 190);
    c.setAttribute('fill', '#444');
    c.setAttribute('stroke', '#000');
    c.setAttribute('stroke-width', '4');
    wheelEl.appendChild(c);
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('y', '8');
    t.setAttribute('fill', '#fff');
    t.setAttribute('font-size', '24');
    t.setAttribute('font-weight', 'bold');
    t.textContent = '参加者なし';
    wheelEl.appendChild(t);
    return;
  }
  const n = candidates.length;
  const slice = 360 / n;
  for (let i = 0; i < n; i++) {
    // slice i center is drawn at angle (-90 + i*slice) from +x axis
    // so slice 0 center is at visual top (-90deg)
    const startA = -90 - slice/2 + i * slice;
    const endA = startA + slice;
    const sx = 190 * Math.cos(startA * Math.PI/180);
    const sy = 190 * Math.sin(startA * Math.PI/180);
    const ex = 190 * Math.cos(endA * Math.PI/180);
    const ey = 190 * Math.sin(endA * Math.PI/180);
    const large = slice > 180 ? 1 : 0;
    const path = document.createElementNS(ns, 'path');
    const d = `M 0 0 L ${sx} ${sy} A 190 190 0 ${large} 1 ${ex} ${ey} Z`;
    path.setAttribute('d', d);
    path.setAttribute('fill', COLORS[i % COLORS.length]);
    path.setAttribute('stroke', '#000');
    path.setAttribute('stroke-width', '3');
    wheelEl.appendChild(path);

    const midA = (startA + endA) / 2;
    const tx = 120 * Math.cos(midA * Math.PI/180);
    const ty = 120 * Math.sin(midA * Math.PI/180);
    const t = document.createElementNS(ns, 'text');
    t.setAttribute('x', tx);
    t.setAttribute('y', ty);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'middle');
    t.setAttribute('fill', '#fff');
    t.setAttribute('font-size', '28');
    t.setAttribute('font-weight', '900');
    t.setAttribute('stroke', '#000');
    t.setAttribute('stroke-width', '2');
    t.setAttribute('paint-order', 'stroke');
    t.setAttribute('transform', `rotate(${midA + 90} ${tx} ${ty})`);
    t.textContent = candidates[i];
    wheelEl.appendChild(t);
  }
}

function playBeep(freq, duration, type='square') {
  try {
    const ctx = window._audioCtx || (window._audioCtx = new (window.AudioContext || window.webkitAudioContext)());
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = 0.08;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

function fanfare() {
  const notes = [523, 659, 784, 1047, 1319];
  notes.forEach((f, i) => setTimeout(() => playBeep(f, 0.35, 'triangle'), i * 120));
}

async function startRoulette() {
  const candidates = getCandidates();
  if (candidates.length === 0) { alert('参加メンバーがいません!'); return; }
  if (candidates.length === 1 && candidates[0] === lastWinner) {
    alert('参加者が1人で、しかも前回と同じ人です! リセットしてください。');
    return;
  }

  isSpinning = true;
  startBtn.disabled = true;
  resetBtn.disabled = true;

  // 当選者を選ぶ（前回と同じ人は除外）
  const pool = candidates.filter(n => n !== lastWinner);
  const finalPool = pool.length > 0 ? pool : candidates;
  const winner = finalPool[Math.floor(Math.random() * finalPool.length)];
  const winIdx = candidates.indexOf(winner);
  const n = candidates.length;
  const slice = 360 / n;

  // ★バグ修正: totalTurnsを整数にする（小数だと停止角度がズレて名前が一致しなくなる）
  // slice i の中心は CSS rotate R 度後に (-90 + i*slice + R) の位置へ移動。
  // ポインター(真上=-90°)に winIdx を合わせるには R = -winIdx*slice (mod 360)
  const startRot = currentRotation;
  const totalTurns = 6 + Math.floor(Math.random() * 3); // 必ず整数！ (6, 7, or 8)
  const jitter = (Math.random() - 0.5) * (slice * 0.7);

  const desiredMod = ((-winIdx * slice + jitter) % 360 + 360) % 360;
  const curMod = ((startRot % 360) + 360) % 360;
  let deltaMod = desiredMod - curMod;
  if (deltaMod <= 0) deltaMod += 360;
  const targetRot = startRot + totalTurns * 360 + deltaMod;

  const duration = 6500 + Math.random() * 1000;
  const startTime = performance.now();

  let lastSliceIdx = -1;
  let lastTickTime = 0;

  return new Promise(resolve => {
    function frame(now) {
      let t = (now - startTime) / duration;
      if (t >= 1) t = 1;

      // なめらかな減速のみ (easeOutQuint)
      const eased = 1 - Math.pow(1 - t, 5);

      currentRotation = startRot + (targetRot - startRot) * eased;
      wheelEl.style.transform = `rotate(${currentRotation}deg)`;

      // カチカチ音
      const curIdx = ((Math.round(-currentRotation / slice) % n) + n) % n;
      if (curIdx !== lastSliceIdx && (now - lastTickTime) > 30) {
        playBeep(600 + (curIdx * 50), 0.04, 'square');
        lastSliceIdx = curIdx;
        lastTickTime = now;
      }

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        wheelEl.classList.add('celebrate');
        setTimeout(() => wheelEl.classList.remove('celebrate'), 1800);
        banner.textContent = winner + ' さん!!';
        banner.classList.add('show');
        fanfare();
        launchConfetti();
        setTimeout(() => banner.classList.remove('show'), 2800);
        lastWinner = winner;
        isSpinning = false;
        startBtn.disabled = false;
        resetBtn.disabled = false;
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });
}

function launchConfetti() {
  const colors = ['#ff0000','#ffd700','#ff69b4','#00bfff','#32cd32','#ff8c00','#ffffff','#9400d3'];
  const shapes = ['◆','●','★','▲','♥','✦'];
  for (let i = 0; i < 180; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    const useShape = Math.random() < 0.5;
    if (useShape) {
      c.textContent = shapes[Math.floor(Math.random() * shapes.length)];
      c.style.background = 'transparent';
      c.style.color = colors[Math.floor(Math.random() * colors.length)];
      c.style.fontSize = (14 + Math.random() * 22) + 'px';
      c.style.width = 'auto';
      c.style.height = 'auto';
    } else {
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
    }
    c.style.left = Math.random() * 100 + 'vw';
    c.style.top = '-20px';
    document.body.appendChild(c);
    const duration = 2500 + Math.random() * 2500;
    const drift = (Math.random() - 0.5) * 400;
    const rot = Math.random() * 720 - 360;
    c.animate([
      { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
      { transform: `translate(${drift}px, 110vh) rotate(${rot}deg)`, opacity: 0.8 }
    ], { duration, easing: 'cubic-bezier(0.2, 0.6, 0.4, 1)' });
    setTimeout(() => c.remove(), duration);
  }
}

function reset() {
  if (isSpinning) return;
  excluded.clear();
  lastWinner = null;
  currentRotation = 0;
  wheelEl.style.transform = 'rotate(0deg)';
  renderMembers();
  drawWheel();
}

startBtn.onclick = startRoulette;
resetBtn.onclick = reset;
renderMembers();
drawWheel();
</script>
</body>
</html>
